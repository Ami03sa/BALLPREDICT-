services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ballpredict
      POSTGRES_USER: ballpredict
      POSTGRES_PASSWORD: ballpredict
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: ..
      dockerfile: infra/backend.Dockerfile
    working_dir: /app/backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      POSTGRES_URL: postgresql+psycopg://ballpredict:ballpredict@db:5432/ballpredict
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ../backend:/app/backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ..
      dockerfile: infra/frontend.Dockerfile
    working_dir: /app/frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    volumes:
      - ../frontend:/app/frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:

